<!--
  Haushaltsplaner Developer Beta 0.31

  In dieser Version wurden die Navigation, die Kennzeichnung bezahlter Posten
  und der Bereich „Rücklagen & Sparen“ weiter verbessert. Alle
  Bereiche, in denen Posten fällig werden, verwenden jetzt einen
  einheitlichen „Markieren“-Knopf anstelle von Checkboxen. Der
  Bereich „Rücklagen & Sparen“ zeigt nur noch die Aufteilung und
  Transaktionen; die Verwaltung der Töpfe und die Gesamtsummen
  befinden sich nun im separaten Menüpunkt „Töpfe“. Zusätzlich wurde
  die Breite des Reload‑Buttons reduziert, so dass er sich besser an
  die Länge seines Textes anpasst.
-->
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haushaltsplaner Developer Beta 0.31</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Haushaltsplaner</h1>
    <nav>
      <select id="sectionSelect">
        <option value="overview">Übersicht</option>
        <option value="common">Gemeinsame Kosten</option>
        <option value="personal">Persönliche Ausgaben</option>
        <option value="debts">Schulden</option>
        <option value="settings">Regeln & Personen</option>
        <option value="savings">Rücklagen &amp; Sparen</option>
        <option value="pots">Töpfe</option>
        <option value="save">Sichern</option>
      </select>
      <button id="reloadButton">Neu laden</button>
    </nav>
  </header>
  <main>
    <section id="overview" class="tab-section active"></section>
    <section id="common" class="tab-section"></section>
    <section id="personal" class="tab-section"></section>
    <section id="debts" class="tab-section"></section>
    <section id="settings" class="tab-section"></section>
    <section id="savings" class="tab-section"></section>
    <section id="pots" class="tab-section"></section>
    <section id="save" class="tab-section"></section>
  </main>
  <footer>
    Developer Beta 0.31
  </footer>
  <script src="script.js"></script>
</body>
</html>
