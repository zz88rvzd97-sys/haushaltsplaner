<!--
  Haushaltsplaner Developer Beta 0.32

  Haushaltsplaner Developer Beta 0.32

  Diese Version erweitert den Bereich „Rücklagen & Sparen“ um eine
  automatische Aufteilungslogik, wie sie in der hochgeladenen Excel‑Datei
  enthalten ist. Für jeden Monat wird der frei verfügbare Betrag ab
  einem Mindestpuffer von 150 € aufgeteilt: 70 % gehen in Rücklagen und
  werden dort auf die Töpfe „Auto“, „Urlaub“, „Anschaffungen (inkl.
  Wohnen)“, „Kleidung“ und „Freizeit“ verteilt; 30 % fließen in das
  Spar‑Depot. Im Menü „Rücklagen & Sparen“ wird eine Tabelle mit den
  Aufteilungswerten für die nächsten zwölf Monate angezeigt. Im Menü
  „Töpfe“ findest du weiterhin die Einzelkonten und deren
  Gesamtsummen sowie die Möglichkeit, Ein‑ und Auszahlungen vorzunehmen
  und die Transaktionen monatsweise einzusehen.
-->
