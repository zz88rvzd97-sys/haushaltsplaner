<!--
  Haushaltsplaner Developer Beta 0.27

  Diese Version behebt ein Rechenproblem bei der Verteilung der
  gemeinsamen Kosten. In den bisherigen Versionen wurden die
  anteiligen Beiträge jeder Person immer unabhängig voneinander auf
  das nächsthöhere 5‑€‑Intervall gerundet. Dadurch ergab sich, dass
  die Summe der gerundeten Anteile oftmals größer war als die
  tatsächliche Gesamtsumme der gemeinsamen Kosten – insbesondere wenn
  der Gesamtbetrag selbst kein Vielfaches von fünf ist.  Die Folge war,
  dass die freien Beträge in der Übersicht nicht mehr korrekt
  erschienen.  Beta 0.27 korrigiert dieses Verhalten: Zwar wird nach
  wie vor für jeden Anteil zunächst aufgerundet, anschließend
  reduziert die App jedoch den größten gerundeten Anteil um die
  überschüssige Differenz, sodass die Summe aller Anteile exakt der
  tatsächlichen Gesamtsumme entspricht.  Dadurch bleiben die Anteile
  weitestgehend auf 5‑€‑Schritte gerundet, ohne dass sich ein
  Differenzbetrag aufaddiert.
-->

        <option value="personal">Persönliche Ausgaben</option>
        <option value="debts">Schulden</option>

    </nav>
  </header>
  <main>
