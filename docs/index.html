<!--
  Haushaltsplaner Developer Beta 0.34
  Diese Version korrigiert die Datenmigration aus älteren Versionen:
  die Beta 0.33 speicherte übernommene Daten versehentlich unter
  einem falschen Schlüssel, sodass vorhandene Töpfe nicht übernommen
  wurden. Beim erstmaligen Laden einer Beta 0.34 Installation werden
  vorhandene Daten aus früheren States korrekt übernommen und unter
  dem neuen Schlüssel gespeichert.

  Außerdem zeigt das Menü „Töpfe“ nun auch ohne vorhandene Töpfe eine
  sinnvolle Übersicht über den Spar‑Plan. Der Bereich „Sichern &
  Exportieren“ ist wieder vollständig nutzbar.
-->

-->
